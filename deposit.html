<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Consultation Deposit | BARE by Marlese</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Montserrat, Arial, sans-serif;
background:#cacdc6;
color:#24221a;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.deposit-card{
background:white;
padding:40px;
border-radius:12px;
max-width:520px;
width:90%;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
font-size:28px;
}

.notice{
font-size:15px;
margin-top:10px;
color:#444;
}

.paypal-container{
margin-top:25px;
}

.secure{
font-size:13px;
margin-top:15px;
color:#777;
}

</style>
</head>

<body>

<div class="deposit-card">

<h1>Consultation Deposit</h1>

<p>
To secure your consultation booking, a small deposit is required.
</p>

<p class="notice">
This deposit will be deducted from your overall treatment cost and is not an additional fee.
</p>

<div class="paypal-container" id="paypal-button-container"></div>

<p class="secure">
Secure payment via PayPal
</p>

</div>


<script src="https://www.paypal.com/sdk/js?client-id=AaJWn1sx65Op3OHJvrwuGiw5J1CB8droT7p1ILNBa1_v_AS5E_rks31HOubCarCGg1m3ZzCPc_3fn1Hu&currency=GBP"></script>

<script>

paypal.Buttons({

createOrder: function(data, actions) {
return actions.order.create({
purchase_units: [{
amount: {
value: '30.00'
}
}]
});
},

onApprove: function(data, actions) {
return actions.order.capture().then(function(details) {

alert("Deposit received. You will now be redirected to booking.");

window.location.href = "booking.html";

});
}

}).render('#paypal-button-container');

</script>

</body>
</html>
