<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Your Appointment | BARE by Marlese</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family: 'Montserrat', sans-serif;
background:#f7f7f5;
margin:0;
padding:0;
color:#24221a;
}

.wrap{
max-width:900px;
margin:auto;
padding:40px 20px;
text-align:center;
}

h1{
font-weight:500;
margin-bottom:10px;
}

.steps{
margin-bottom:35px;
font-size:14px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.steps span{
display:inline-block;
padding:8px 16px;
border-radius:30px;
background:#e7e9e4;
color:#5e6959;
font-weight:500;
}

.steps .complete{
background:#cacdc6;
color:#24221a;
}

.steps .active{
background:#5e6959;
color:white;
}
.booking-box{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

iframe{
border:0;
width:100%;
height:700px;
}
.button-row{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}  

.fallback{
margin-top:20px;
}

.btn{
display:inline-block;
padding:14px 24px;
background:#5e6959;
color:white;
text-decoration:none;
border-radius:4px;
margin-top:15px;
}

.btn:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Book Your Appointment</h1>

<div class="steps">
<span class="complete">✓ Consultation Completed</span>
<span class="active">Step 2: Book Appointment</span>
</div>

<p>Please select your preferred appointment time below.</p>

<div class="booking-box">

<!-- GOOGLE BOOKING EMBED -->
<iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ3GLomGoNPn2sNp4JOOOCnwmQ26Oz8eZr-t-IXRlezb1Y8NDF-bLjWTef4_kJtmY3PivvGz4wcT?gv=true"
style="border:0"
width="100%"
height="700"
frameborder="0">
</iframe>


<div class="button-row">

<a class="btn" href="https://barebymarlese.com">
Return to Homepage
</a>

</div>

</div>

</div>
</body>
</html>
